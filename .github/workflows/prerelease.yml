name: Prerelease

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release (major, minor, patch)'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
        default: patch

jobs:
  prerelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Get latest tag
        id: get_latest_tag
        run: |
          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            git fetch --prune --unshallow
          fi

          latest_version="$(git tag --sort=creatordate | tail -n 1)"
          latest_version="${latest_version#v}"

          if [ -z "$latest_version" ]; then
            latest_version="0.0.0"
          fi

          echo "latest_version=$latest_version" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: calculate_new_version
        run: |
          if [ "${{ github.event.inputs.release_type }}" = "major" ]; then
            new_version=$(echo "${{ steps.get_latest_tag.outputs.latest_version }}" | awk -F. -v OFS=. '{$1=$1+1; $2=0; $3=0; print}')

          elif [ "${{ github.event.inputs.release_type }}" = "minor" ]; then
            new_version=$(echo "${{ steps.get_latest_tag.outputs.latest_version }}" | awk -F. -v OFS=. '{$2=$2+1; $3=0; print}')

          elif [ "${{ github.event.inputs.release_type }}" = "patch" ]; then
            new_version=$(echo "${{ steps.get_latest_tag.outputs.latest_version }}" | awk -F. -v OFS=. '{$3=$3+1; print}')

          else
            echo "Invalid release type: ${{ github.event.inputs.release_type }}"
            exit 1
          fi

          echo "new_version=$new_version" >> $GITHUB_OUTPUT

      - name: Bump version in README.md
        run: |
          new_version="${{ steps.calculate_new_version.outputs.new_version }}"
          sed -i "s;v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*;v${new_version};g" README.md
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "release: bump version to v${new_version}"
          git tag "v${new_version}"
          git push origin "v${new_version}"

      - name: Create prerelease tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.calculate_new_version.outputs.new_version }}"
          name: "Release v${{ steps.calculate_new_version.outputs.new_version }}"
          generate_release_notes: true
          draft: false
          prerelease: true